name: Build NASHR APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Pillow
        run: pip install Pillow --quiet

      - name: Prepare build folder
        run: |
          mkdir -p app/build
          rsync -av --exclude='.github' --exclude='app' --exclude='node_modules' . app/build/

      - name: Init Capacitor
        run: |
          cd app
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          npx cap init "NASHR PRO" "dev.mohamedghanem.nashr" --web-dir build

      - name: Add Android
        run: |
          cd app
          npx cap add android

      - name: Setup icon
        run: python3 resize_icon.py

      - name: Generate assets
        run: |
          cd app
          npx capacitor-assets generate --android

      - name: Build APK
        run: |
          cd app/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: NASHR-APK
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
